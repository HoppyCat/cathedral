name: Sync template from soulmode-agent

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # manual trigger any time

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout cathedral
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout soulmode-agent (source of truth)
        uses: actions/checkout@v4
        with:
          repository: HoppyCat/soulmode-agent
          path: _soulmode-agent

      - name: Sync on-load/
        run: |
          rsync -av --delete \
            _soulmode-agent/on-load/ \
            soulmode-template/on-load/

      - name: Sync on-demand/patches/
        run: |
          rsync -av --delete \
            _soulmode-agent/on-demand/patches/ \
            soulmode-template/on-demand/patches/

      - name: Sync on-demand/index/
        run: |
          mkdir -p soulmode-template/on-demand/index
          rsync -av --delete \
            _soulmode-agent/on-demand/index/ \
            soulmode-template/on-demand/index/

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add soulmode-template/on-load/ soulmode-template/on-demand/
          if git diff --staged --quiet; then
            echo "soulmode-template is already up to date."
          else
            git commit -m "sync: update soulmode-template from HoppyCat/soulmode-agent"
            git push
          fi